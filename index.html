<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#262924">
  <title>关系问答手册</title>
  <style>
    :root{--ink:#25231f;--muted:#716b62;--paper:#f7f4ed;--card:#fffefb;--line:#ddd7cd;--accent:#c8543f;--sage:#6e826e;--soft:#eee8dd}
    *{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif}button,input,textarea{font:inherit}
    .hero{background:#262924;color:#f8f2e6;padding:36px 18px 44px;border-bottom:5px solid var(--accent)}.inner,.toolbar,.content{width:min(880px,calc(100% - 24px));margin:auto}.tag{color:#d9b9a7;font-size:13px;letter-spacing:.14em}h1{font-family:"Songti SC",serif;font-size:42px;line-height:1.1;margin:12px 0}.hero p{color:#d9d5cd;line-height:1.7;margin:0}.progress{display:flex;gap:12px;align-items:center;margin-top:20px}.track{height:7px;background:#50534d;border-radius:10px;flex:1;overflow:hidden}.bar{display:block;height:100%;background:#d8785f}.mode-box{margin-top:22px;display:grid;grid-template-columns:1fr 1fr;gap:8px}.mode-box button,.person-tabs button{border:1px solid #77756f;background:transparent;color:#f8f2e6;padding:11px;border-radius:8px}.mode-box button.active{background:#f8f2e6;color:#262924;border-color:#f8f2e6}.pair-note{display:none;margin-top:12px;color:#edd0c1!important;font-size:13px}.pair-note.show{display:block}
    .toolbar-wrap{position:sticky;top:0;z-index:5;background:#f7f4edf2;border-bottom:1px solid var(--line);padding:10px 0}.person-tabs{display:none;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}.person-tabs.show{display:grid}.person-tabs button{color:var(--ink);border-color:var(--line);background:#fff}.person-tabs button.active{background:var(--sage);color:#fff;border-color:var(--sage)}.toolbar{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.search{grid-column:1/-1;padding:11px 12px;border:1px solid var(--line);background:#fff}.toolbar button{border:0;color:#fff;padding:11px 6px;border-radius:5px}.filter{background:var(--sage)}.export{background:var(--ink)}.share{background:var(--accent)}.invite{display:none;background:#8a654e}.invite.show{display:block}.notice{grid-column:1/-1;margin:0;color:var(--accent);font-size:13px;line-height:1.5}.reference{display:none;grid-column:1/-1;background:#fff5e9;border:1px solid #e8c9aa;padding:10px;color:#795637;font-size:13px}.reference.show{display:block}
    .content{padding:30px 0 70px}.section{margin-bottom:40px}.section h2{font-family:"Songti SC",serif;font-size:25px;margin:0}.section-sub{color:var(--muted);font-size:14px;margin:5px 0 16px}.card{background:var(--card);border:1px solid var(--line);padding:18px 15px;margin-bottom:12px}.card.done{border-left:4px solid var(--sage)}.q{display:flex;gap:11px;align-items:flex-start}.num{border:1px solid var(--line);color:var(--muted);min-width:29px;height:29px;display:grid;place-items:center;font-size:12px}.q h3{font-size:16px;line-height:1.6;margin:2px 0 14px}.card textarea{width:100%;min-height:110px;resize:vertical;border:1px solid var(--line);background:#faf8f3;padding:12px;font-size:16px;line-height:1.6;color:var(--ink)}.card textarea[readonly]{background:var(--soft);color:#5f5a52}.readonly-tip{display:none;color:var(--muted);font-size:12px;margin-top:7px}.readonly-tip.show{display:block}.mic{margin-top:8px;border:0;background:transparent;color:var(--accent);padding:9px 2px}.mic.on{font-weight:bold;animation:pulse 1s infinite}.mic.hidden{display:none}.record-time{color:var(--accent);font-size:13px;margin-left:8px}.audio-box{display:none;margin-top:10px;padding:10px;background:#f1eee7;border:1px solid var(--line)}.audio-box.show{display:block}.audio-box audio{width:100%;height:42px}.audio-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}.audio-actions button{border:1px solid var(--line);background:#fff;color:var(--ink);padding:7px 10px;font-size:13px}.audio-actions .delete-audio{color:var(--accent)}@keyframes pulse{50%{opacity:.45}}footer{text-align:center;color:var(--muted);font-size:13px;border-top:1px solid var(--line);padding:28px 15px 44px}
    @media(min-width:650px){.hero{padding:48px 20px 56px}h1{font-size:58px}.mode-box{max-width:430px}.toolbar{grid-template-columns:1fr repeat(4,auto)}.search{grid-column:auto}.toolbar button{padding:10px 14px}.card{padding:22px}.card textarea,.mic,.audio-box,.readonly-tip{margin-left:40px;width:calc(100% - 40px)}}
  </style>
</head>
<body>
  <header class="hero"><div class="inner">
    <span class="tag">给自己，也给彼此一点诚实的时间</span>
    <h1>关系问答手册</h1>
    <p>单人版保存自己的一份；双人版把两个人的回答分开保存，互不覆盖。录音保留原声，并在支持的浏览器中同步转成文字。</p>
    <div class="mode-box"><button id="singleMode">单人版</button><button id="pairMode">双人版</button></div>
    <p class="pair-note" id="pairNote">双人版中，“我的回答”和“对方回答”使用两份独立记录。</p>
    <div class="progress"><div class="track"><span class="bar" id="bar"></span></div><strong id="count">0/0</strong></div>
  </div></header>
  <div class="toolbar-wrap"><div class="toolbar">
    <div class="person-tabs" id="personTabs"><button id="mineTab">我的回答</button><button id="partnerTab">对方回答</button></div>
    <div class="reference" id="reference">你正在查看对方发来的基础回答。填写“我的回答”不会修改对方的内容。</div>
    <input id="search" class="search" placeholder="搜索题目">
    <button class="filter" id="filter">只看未回答</button>
    <button class="export" id="export">导出当前回答</button>
    <button class="share" id="share">分享当前回答</button>
    <button class="invite" id="invite">邀请对方回答</button>
    <p class="notice" id="notice"></p>
  </div></div>
  <main class="content" id="content"></main>
  <footer>题目页面公开 · 两个人的文字与录音分别保存 · 主动分享后别人才会看到</footer>
  <script>
  const sections=[{"title":"个人基础情况","subtitle":"成长经历、家庭关系与生活选择","questions":["你的出生年月日？","你是否吸烟？","你的身体和精神健康情况怎么样？","你有何宗教信仰？我们能否做到互相尊重？","你六岁前和谁一起长大？","家庭成员里有控制欲很强的人吗？","如果能改变家庭中曾经发生的一件事，你会改变什么？","你的家庭是否亲密和温暖？你是否感觉自己的童年比大多数人都幸福？","你和妈妈的关系怎么样？","失去哪一位家庭成员最让你伤痛？","你会超前消费吗？","有什么东西，是你再穷也不会舍弃的？","我们可以为了更好的物质生活，放弃一部分陪伴吗？","我们愿意给彼此的付出，有怎样的限额或条件？","目前对这段关系的期待是什么？","在感情里你最向往什么？"]},{"title":"关系与自我","subtitle":"先从关系观、友情和自我认识开始","questions":["你愿意为了这段关系付出什么？这段关系对你来说有什么意义？","怎样做对你来说才算真正结束一段关系？","你对前任是什么态度？","你如何界定与异性友人的距离？","你有深厚、长久的朋友吗？","你最看重朋友的什么特点？","你最痛恨别人的什么特点？","你这一生中最爱的人或东西是什么？","你认为最完美的快乐是怎样的？","何时、何地会让你感觉最快乐？","你觉得人生最苦的时候是什么时候？","你最奢侈的是什么？","关于自己，你最害怕什么？","你自己的哪个特点让你最觉得痛恨？","你能接受的迎合别人的程度是多少？"]},{"title":"相处框架","subtitle":"亲密、安全感、尊重与接纳","questions":["亲近对你来说会有压力吗？","你希望让我知道你内心深处的感觉吗？","你觉得在恋爱关系中开诚布公是一件舒服的事情吗？","你会担心被抛弃吗？","过分亲密会让你感到紧张吗？","你需要我一再保证我是爱你的吗？","你向我求助的时候，会觉得有用吗？","在这段感情里，什么时候会感到不安与焦虑？","你在感受不到爱的时候会大声说出来吗？","什么会给你最大的安全感？你会有怎样的反应？","在谁的身边你觉得最舒服？那段回忆是什么样的？","在你的生命中，爱情和亲情分别扮演着什么角色？","你尊重对方吗？","你在什么时候感觉到了对方的尊重？","对方做什么会让你想要去尊重他？","分享你认为对方具有的五个正面性格特点。","你最看重恋人的哪三个性格特点？","生活中，我有什么行为是让你受不了的？","互相说出一个从没说出口的‘糟糕’一面吧。","我们对彼此的接纳是否存在底线？那条线是什么？","我们是否有共同爱好？是否愿意培养共同爱好？","工作与恋爱发生冲突时，你会怎么解决？","你会如何对待感情中的期待与失落？","你会迎合对方对于爱的期待吗？","对方没有按照你的想象去爱，你会如何应对？","你会如何维系爱的稳定与持久？"]},{"title":"个性与深度交流","subtitle":"独处、沟通方式和情绪边界","questions":["独处会让你感到焦虑吗？","你有移情和情感共鸣的能力吗，还是觉得自己有时只是在机械地模仿？","你会如何打发一个人无聊的时光？","你会喜欢爱操心的伴侣吗？会要求伴侣时刻在身边吗？","你如何评价上一段感情？","你认为自己是某段感情的‘受害者’吗？","你可以进行深度交流吗？会惧怕深层次的沟通吗？","你觉得我们是灵魂伴侣吗？你对‘灵魂伴侣’的感受是什么？","你怎么看待情绪虐待？什么样的对待对你来说是情绪虐待？","你认为沉默对待是一种残酷的精神虐待吗？沉默的本质是让人和自己对抗，甚至是一种制裁吗？","在感觉感情难以维系时，你是否能勇敢地提出终止？","感情难以维系时，你会被动处理吗？会如何被动处理？","在感情里你最害怕什么？","你坚持最久的一件事是什么？坚持了多久？","在精神层面，让你感到骄傲的是什么？","性生活对你来说是必须的吗？","分享一个性偏好或性幻想。","分享一个自己的性焦虑。"]},{"title":"未来规划","subtitle":"目标、生活地点和下一代","questions":["你是一个有目标的人吗？你近期的目标是什么？","你希望未来在哪个地区发展？","你对下一代有什么观念？","如果我是你孩子以后的爸爸或妈妈，你愿意吗？"]}];
  const questions=sections.flatMap(s=>s.questions);
  const STORE_KEY="relationship-dual-v1";
  const OLD_KEY="relationship-question-answers-v2";
  const MODE_KEY="relationship-mode-v1";
  let store={single:{},pairs:{local:{mine:{},partner:{}}}};
  try{const saved=JSON.parse(localStorage.getItem(STORE_KEY)||"null");if(saved&&saved.single&&saved.pairs)store=saved}catch(e){}
  try{const old=JSON.parse(localStorage.getItem(OLD_KEY)||"{}");if(!Object.keys(store.single).length&&Object.keys(old).length){store.single={...old};store.pairs.local.mine={...old}}}catch(e){}
  let mode=localStorage.getItem(MODE_KEY)==="pair"?"pair":"single";
  let pairId="local",side="mine",incoming=null,onlyEmpty=false,activeRecording=null;
  const audioUrls={};
  const content=document.getElementById("content"),notice=document.getElementById("notice"),search=document.getElementById("search"),filter=document.getElementById("filter");

  function decodePayload(value){try{const b=value.replace(/-/g,"+").replace(/_/g,"/");return JSON.parse(decodeURIComponent(escape(atob(b))))}catch(e){return null}}
  function encodePayload(value){return btoa(unescape(encodeURIComponent(JSON.stringify(value)))).split("+").join("-").split("/").join("_").replace(/=+$/g,"")}
  const hashValue=new URLSearchParams(location.hash.slice(1)).get("pair");
  if(hashValue){incoming=decodePayload(hashValue);if(incoming&&incoming.id){mode="pair";pairId=String(incoming.id);if(!store.pairs[pairId]){if(incoming.kind==="reply")store.pairs[pairId]={mine:incoming.ownerAnswers||{},partner:incoming.partnerAnswers||{}};else store.pairs[pairId]={mine:{},partner:incoming.ownerAnswers||{}}}side=incoming.kind==="invite"?"mine":"mine";localStorage.setItem(MODE_KEY,"pair")}}
  function pair(){if(!store.pairs[pairId])store.pairs[pairId]={mine:{},partner:{}};return store.pairs[pairId]}
  function answers(){return mode==="single"?store.single:pair()[side]}
  function isReadOnly(){return !!(incoming&&incoming.kind==="invite"&&side==="partner")}
  function save(){localStorage.setItem(STORE_KEY,JSON.stringify(store));localStorage.setItem(MODE_KEY,mode);updateProgress()}
  function scope(){return mode==="single"?"single":"pair:"+pairId+":"+side}
  function audioKey(i){return scope()+":"+i}
  function updateProgress(){const a=answers(),n=Object.values(a).filter(v=>String(v).trim()).length;document.getElementById("count").textContent=n+"/"+questions.length;document.getElementById("bar").style.width=Math.round(n/questions.length*100)+"%"}
  function syncControls(){
    document.getElementById("singleMode").classList.toggle("active",mode==="single");document.getElementById("pairMode").classList.toggle("active",mode==="pair");
    document.getElementById("pairNote").classList.toggle("show",mode==="pair");document.getElementById("personTabs").classList.toggle("show",mode==="pair");document.getElementById("invite").classList.toggle("show",mode==="pair");
    document.getElementById("mineTab").classList.toggle("active",side==="mine");document.getElementById("partnerTab").classList.toggle("active",side==="partner");
    document.getElementById("partnerTab").textContent=incoming&&incoming.kind==="invite"?"对方原回答":"对方回答";
    document.getElementById("reference").classList.toggle("show",!!(incoming&&incoming.kind==="invite"));
    document.getElementById("invite").textContent=incoming&&incoming.kind==="invite"?"把我的回答发回去":"邀请对方回答";
  }
  function render(){
    syncControls();const a=answers(),q=search.value.trim().toLowerCase(),readonly=isReadOnly();content.innerHTML="";
    sections.forEach(s=>{const visible=s.questions.map(x=>({x,i:questions.indexOf(x)})).filter(o=>(!q||o.x.toLowerCase().includes(q))&&(!onlyEmpty||!String(a[o.i]||"").trim()));if(!visible.length)return;
      const sec=document.createElement("section");sec.className="section";sec.innerHTML="<h2>"+s.title+"</h2><p class='section-sub'>"+s.subtitle+"</p>";
      visible.forEach(o=>{const card=document.createElement("article");card.className="card"+(String(a[o.i]||"").trim()?" done":"");card.innerHTML="<div class='q'><span class='num'>"+(o.i+1)+"</span><h3>"+o.x+"</h3></div><textarea placeholder='录音转写会出现在这里，也可以手动修改'></textarea><p class='readonly-tip'>这是对方发来的基础回答，不会被你修改。</p><button class='mic'>🎙 开始录音</button><span class='record-time'></span><div class='audio-box'><audio controls preload='metadata'></audio><div class='audio-actions'><button class='share-audio'>分享录音</button><button class='download-audio'>下载录音</button><button class='delete-audio'>删除录音</button></div></div>";
        const ta=card.querySelector("textarea"),mic=card.querySelector(".mic");ta.value=a[o.i]||"";ta.readOnly=readonly;mic.classList.toggle("hidden",readonly);card.querySelector(".readonly-tip").classList.toggle("show",readonly);
        ta.addEventListener("input",()=>{a[o.i]=ta.value;save();card.classList.toggle("done",!!ta.value.trim())});mic.addEventListener("click",()=>toggleRecording(o.i,ta,mic,card));card.querySelector(".share-audio").addEventListener("click",()=>shareOneRecording(o.i));card.querySelector(".download-audio").addEventListener("click",()=>downloadRecording(o.i));card.querySelector(".delete-audio").addEventListener("click",()=>deleteRecording(o.i,card));showSavedRecording(o.i,card);sec.appendChild(card)});content.appendChild(sec)});updateProgress()
  }
  function openAudioDb(){return new Promise((resolve,reject)=>{const req=indexedDB.open("relationship-audio-v1",1);req.onupgradeneeded=()=>{if(!req.result.objectStoreNames.contains("recordings"))req.result.createObjectStore("recordings")};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error)})}
  async function putRecording(i,value){const db=await openAudioDb(),k=audioKey(i);return new Promise((resolve,reject)=>{const tx=db.transaction("recordings","readwrite");tx.objectStore("recordings").put({...value,key:k,i,scope:scope()},k);tx.oncomplete=()=>{db.close();resolve()};tx.onerror=()=>reject(tx.error)})}
  async function getRecording(i){const db=await openAudioDb(),k=audioKey(i);return new Promise((resolve,reject)=>{const req=db.transaction("recordings").objectStore("recordings").get(k);req.onsuccess=()=>{db.close();resolve(req.result)};req.onerror=()=>reject(req.error)})}
  async function getRecordingsForScope(targetScope){const db=await openAudioDb();return new Promise((resolve,reject)=>{const req=db.transaction("recordings").objectStore("recordings").getAll();req.onsuccess=()=>{const items=req.result.filter(v=>v&&v.scope===targetScope).map(v=>({i:v.i,data:v}));db.close();resolve(items)};req.onerror=()=>reject(req.error)})}
  async function getAllRecordings(){return getRecordingsForScope(scope())}
  async function copyRecordings(fromScope,toScope){const items=await getRecordingsForScope(fromScope);if(!items.length)return;const db=await openAudioDb();return new Promise((resolve,reject)=>{const tx=db.transaction("recordings","readwrite"),objectStore=tx.objectStore("recordings");items.forEach(({i,data})=>objectStore.put({...data,key:toScope+":"+i,scope:toScope},toScope+":"+i));tx.oncomplete=()=>{db.close();resolve()};tx.onerror=()=>reject(tx.error)})}
  async function removeRecording(i){const db=await openAudioDb(),k=audioKey(i);return new Promise((resolve,reject)=>{const tx=db.transaction("recordings","readwrite");tx.objectStore("recordings").delete(k);tx.oncomplete=()=>{db.close();resolve()};tx.onerror=()=>reject(tx.error)})}
  function audioFile(i,r,whoOverride){const ext=(r.type||"").includes("mp4")?"m4a":"webm",who=whoOverride||(mode==="pair"?(side==="mine"?"我的":"对方的"):"我的");return new File([r.blob],who+"第"+(Number(i)+1)+"题录音."+ext,{type:r.type||r.blob.type})}
  async function showSavedRecording(i,card){const r=await getRecording(i),box=card.querySelector(".audio-box"),audio=box.querySelector("audio"),k=audioKey(i);if(!r){box.classList.remove("show");return}if(audioUrls[k])URL.revokeObjectURL(audioUrls[k]);audioUrls[k]=URL.createObjectURL(r.blob);audio.src=audioUrls[k];box.classList.add("show")}
  async function toggleRecording(i,ta,btn,card){
    if(activeRecording){if(activeRecording.key===audioKey(i))stopRecording();else notice.textContent="请先结束当前录音，再录下一题。";return}
    if(!navigator.mediaDevices||!window.MediaRecorder){notice.textContent="这个浏览器不能直接录音，请换用手机 Chrome 或 Safari。";return}
    try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});const preferred=MediaRecorder.isTypeSupported("audio/mp4")?"audio/mp4":(MediaRecorder.isTypeSupported("audio/webm;codecs=opus")?"audio/webm;codecs=opus":"");const recorder=preferred?new MediaRecorder(stream,{mimeType:preferred}):new MediaRecorder(stream);const chunks=[],a=answers(),base=String(a[i]||"").trim();let recognition=null;const R=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(R){recognition=new R();recognition.lang="zh-CN";recognition.continuous=true;recognition.interimResults=true;recognition.onresult=e=>{let words="";for(let n=0;n<e.results.length;n++)words+=e.results[n][0].transcript;a[i]=(base?base+" ":"")+words;ta.value=a[i];save()};recognition.onerror=()=>{notice.textContent="录音仍在保存；当前浏览器没有完成同步转文字，可以稍后手动修改。"}}
      recorder.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};recorder.onstop=async()=>{const blob=new Blob(chunks,{type:recorder.mimeType||preferred||"audio/webm"});await putRecording(i,{blob,type:blob.type,createdAt:Date.now()});stream.getTracks().forEach(t=>t.stop());await showSavedRecording(i,card);notice.textContent="录音已保存到这台手机，并与另一份回答分开。"};
      const started=Date.now(),time=card.querySelector(".record-time"),timer=setInterval(()=>{const seconds=Math.floor((Date.now()-started)/1000);time.textContent=Math.floor(seconds/60)+":"+String(seconds%60).padStart(2,"0")},500);activeRecording={key:audioKey(i),recorder,recognition,stream,btn,time,timer};recorder.start(500);if(recognition)try{recognition.start()}catch(e){}btn.textContent="■ 结束录音";btn.classList.add("on");notice.textContent=recognition?"正在录音并同步转文字。":"正在保存录音；此浏览器暂不支持同步转文字。"
    }catch(e){notice.textContent="无法使用麦克风，请在浏览器设置中允许麦克风权限。"}
  }
  function stopRecording(){const a=activeRecording;if(!a)return;clearInterval(a.timer);a.btn.textContent="🎙 开始录音";a.btn.classList.remove("on");a.time.textContent="";try{if(a.recognition)a.recognition.stop()}catch(e){}if(a.recorder.state!=="inactive")a.recorder.stop();activeRecording=null}
  async function shareOneRecording(i){const r=await getRecording(i);if(!r)return;const f=audioFile(i,r);try{if(navigator.canShare&&navigator.canShare({files:[f]}))await navigator.share({title:"第"+(i+1)+"题录音",files:[f]});else downloadBlob(f,f.name)}catch(e){if(e.name!=="AbortError")downloadBlob(f,f.name)}}
  async function downloadRecording(i){const r=await getRecording(i);if(r){const f=audioFile(i,r);downloadBlob(f,f.name)}}
  function downloadBlob(blob,name){const u=URL.createObjectURL(blob),a=document.createElement("a");a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)}
  async function deleteRecording(i,card){await removeRecording(i);const k=audioKey(i);if(audioUrls[k]){URL.revokeObjectURL(audioUrls[k]);delete audioUrls[k]}card.querySelector(".audio-box").classList.remove("show");notice.textContent="这条录音已删除。"}
  function answerText(a=answers(),label="我的回答"){return label+"\n\n"+questions.map((q,i)=>(i+1)+". "+q+"\n"+(String(a[i]||"").trim()||"（未回答）")).join("\n\n")}
  async function shareTextAndAudio(){const t=answerText(),name=mode==="pair"?(side==="mine"?"我的回答":"对方回答"):"我的回答",textFile=new File([t],name+".txt",{type:"text/plain"}),saved=await getAllRecordings(),files=[textFile].concat(saved.map(x=>audioFile(x.i,x.data)));if(!saved.length&&!Object.values(answers()).some(v=>String(v).trim())){notice.textContent="先回答或录音，再分享吧。";return}try{if(navigator.canShare&&navigator.canShare({files}))await navigator.share({title:name,text:"文字和语音记录",files});else if(navigator.share)await navigator.share({title:name,text:t});else{await navigator.clipboard.writeText(t);notice.textContent="文字已复制；录音可以在每题下面单独分享。"}}catch(e){if(e.name!=="AbortError"){await navigator.clipboard.writeText(t);notice.textContent="文字已复制；录音可以在每题下面单独分享。"}}}
  async function sharePairLink(){
    let payload,title,text;
    if(incoming&&incoming.kind==="invite"){
      payload={v:1,kind:"reply",id:pairId,ownerAnswers:pair().partner,partnerAnswers:pair().mine};title="双人关系问答 · 我的回答";text="我已经写好了另一份回答，打开链接可以并排查看，两份内容互不覆盖。";
    }else{if(!Object.values(pair().mine).some(v=>String(v).trim())){notice.textContent="请先在“我的回答”里填写一些内容，再邀请对方。";return}if(pairId==="local"){const localPair=pair(),oldScope="pair:local:mine";pairId=Date.now().toString(36)+Math.random().toString(36).slice(2,7);store.pairs[pairId]={mine:{...localPair.mine},partner:{...localPair.partner}};await copyRecordings(oldScope,"pair:"+pairId+":mine");save()}payload={v:1,kind:"invite",id:pairId,ownerAnswers:pair().mine};title="双人关系问答邀请";text="这是我的回答。请在不修改我内容的情况下，填写你自己的另一份。"}
    const url=location.origin+location.pathname+"#pair="+encodePayload(payload),savedAudio=await getRecordingsForScope("pair:"+pairId+":mine"),audioFiles=savedAudio.map(x=>audioFile(x.i,x.data,"我的")),shareText=text+(audioFiles.length?"\n已附上 "+audioFiles.length+" 条原始录音，请和链接一起保存。":"");try{if(audioFiles.length&&navigator.canShare&&navigator.canShare({files:audioFiles}))await navigator.share({title,text:shareText,url,files:audioFiles});else if(navigator.share)await navigator.share({title,text:shareText,url});else{await navigator.clipboard.writeText(shareText+"\n"+url);notice.textContent=audioFiles.length?"链接已复制；当前浏览器不能把录音附件一起发送，请在每题下单独分享录音。":"邀请链接已复制，可以发给对方。"}}catch(e){if(e.name!=="AbortError"){await navigator.clipboard.writeText(shareText+"\n"+url);notice.textContent=audioFiles.length?"链接已复制；若分享窗口没有录音，请在每题下单独分享录音。":"邀请链接已复制，可以发给对方。"}}
  }
  document.getElementById("singleMode").onclick=()=>{if(activeRecording)stopRecording();mode="single";save();render()};
  document.getElementById("pairMode").onclick=()=>{if(activeRecording)stopRecording();mode="pair";save();render()};
  document.getElementById("mineTab").onclick=()=>{if(activeRecording)stopRecording();side="mine";render()};
  document.getElementById("partnerTab").onclick=()=>{if(activeRecording)stopRecording();side="partner";render()};
  document.getElementById("export").onclick=()=>{const b=new Blob([answerText()],{type:"text/plain;charset=utf-8"}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download=(mode==="pair"?(side==="mine"?"我的回答":"对方回答"):"我的回答")+".txt";a.click();URL.revokeObjectURL(u)};
  document.getElementById("share").onclick=shareTextAndAudio;document.getElementById("invite").onclick=sharePairLink;
  filter.onclick=()=>{onlyEmpty=!onlyEmpty;filter.textContent=onlyEmpty?"✓ 只看未回答":"只看未回答";render()};search.oninput=render;save();render();
  </script>
</body></html>
