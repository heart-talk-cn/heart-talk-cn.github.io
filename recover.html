<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#263027">
  <title>找回我的关系问答记录</title>
  <style>
    :root{--ink:#25231f;--paper:#f7f4ed;--card:#fffefb;--line:#ddd7cd;--green:#426b49;--red:#b54332;--muted:#716b62}
    *{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif}.wrap{width:min(680px,calc(100% - 28px));margin:auto;padding:28px 0 70px}h1{font-family:"Songti SC",serif;font-size:32px;margin:0 0 8px}.lead{color:var(--muted);line-height:1.7}.card{margin-top:18px;padding:18px;background:var(--card);border:1px solid var(--line);border-left:5px solid var(--green)}.status{font-size:18px;font-weight:700;line-height:1.6}.detail{color:var(--muted);line-height:1.7;margin:8px 0 15px}.actions{display:grid;gap:10px}.actions button,.actions a{border:0;border-radius:8px;padding:13px 15px;background:var(--green);color:#fff;text-align:center;text-decoration:none;font-weight:700}.actions .secondary{background:#766d61}.actions .share{background:var(--red)}.actions [disabled]{opacity:.55}.links{display:none;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}.links.show{display:block}.linkrow{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:10px}.linkrow input{min-width:0;padding:11px;border:1px solid var(--line);background:#fff}.linkrow button{border:0;border-radius:7px;padding:10px 12px;background:#586f59;color:#fff}.warning{margin-top:18px;color:#8a493d;font-size:13px;line-height:1.7}.progress{display:none;margin-top:12px;color:var(--green);font-weight:700}.progress.show{display:block}@media(max-width:520px){.linkrow{grid-template-columns:1fr}.wrap{padding-top:22px}}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>找回我的旧回答</h1>
    <p class="lead">请务必用原来填写内容的同一个手机浏览器打开本页。这里会读取这台手机中原来保存的文字和录音，不会清空或覆盖它们。</p>
    <section class="card">
      <div class="status" id="status">正在检查这台手机里的旧记录……</div>
      <p class="detail" id="detail">请稍候，不要关闭页面。</p>
      <div class="actions">
        <button id="recover" disabled>保存旧内容并生成分享链接</button>
        <button class="secondary" id="backup" disabled>先下载一份文字安全备份</button>
        <a id="newEntry" href="https://heart-talk-mobile.heart-talk-cn-space.workers.dev/?new=1">没有旧内容，打开新版填写</a>
      </div>
      <p class="progress" id="progress"></p>
      <div class="links" id="links">
        <strong>✓ 已保存成功</strong>
        <div class="linkrow"><input id="shareLink" readonly aria-label="给别人看的分享链接"><button id="copyShare">复制分享链接</button></div>
        <div class="linkrow"><input id="editLink" readonly aria-label="自己继续填写的链接"><button id="copyEdit">复制我的编辑链接</button></div>
        <div class="actions" style="margin-top:10px"><a class="share" id="openEdit" href="#">打开我的记录继续填写</a></div>
      </div>
    </section>
    <p class="warning">如果显示“没有找到”，通常是因为打开了不同的浏览器。例如以前在 Safari 填写，就必须仍用 Safari 打开；以前在微信里填写，就要从微信里打开。</p>
  </main>
  <script>
  const CLOUD="https://heart-talk-mobile.heart-talk-cn-space.workers.dev",STORE="relationship-dual-v1",OLD="relationship-question-answers-v2",MODE="relationship-mode-v1",MIGRATED="heart-talk-cloud-migration-v1";
  const statusEl=document.getElementById("status"),detailEl=document.getElementById("detail"),recoverBtn=document.getElementById("recover"),backupBtn=document.getElementById("backup"),progressEl=document.getElementById("progress"),linksEl=document.getElementById("links"),shareLink=document.getElementById("shareLink"),editLink=document.getElementById("editLink"),openEdit=document.getElementById("openEdit");
  let recovery=null;
  function json(key,fallback){try{return JSON.parse(localStorage.getItem(key)||"null")||fallback}catch(e){return fallback}}
  function textCount(value){return Object.values(value||{}).filter(v=>String(v||"").trim()).length}
  function openDb(){return new Promise((resolve,reject)=>{const req=indexedDB.open("relationship-audio-v1",1);req.onupgradeneeded=()=>{if(!req.result.objectStoreNames.contains("recordings"))req.result.createObjectStore("recordings")};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error)})}
  async function recordings(){try{const db=await openDb();return await new Promise((resolve,reject)=>{const req=db.transaction("recordings").objectStore("recordings").getAll();req.onsuccess=()=>{db.close();resolve(req.result||[])};req.onerror=()=>reject(req.error)})}catch(e){return []}}
  function chooseRecovery(store,audio){
    const single=store.single||{},mode=localStorage.getItem(MODE)==="pair"?"pair":"single";
    const pairs=Object.entries(store.pairs||{}).map(([id,p])=>{const mine=p&&p.mine||{},partner=p&&p.partner||{},scopes=["pair:"+id+":mine","pair:"+id+":partner"],score=textCount(mine)+textCount(partner)+audio.filter(x=>scopes.includes(x.scope)).length;return{id,mine,partner,score}}).sort((a,b)=>b.score-a.score);
    const singleScore=textCount(single)+audio.filter(x=>x.scope==="single").length,pair=pairs[0];
    if(mode==="pair"&&pair&&pair.score)return{mode:"pair",groups:[{role:"owner",answers:pair.mine,scope:"pair:"+pair.id+":mine"},{role:"partner",answers:pair.partner,scope:"pair:"+pair.id+":partner"}],audio,total:pair.score};
    if(singleScore)return{mode:"single",groups:[{role:"owner",answers:single,scope:"single"}],audio,total:singleScore};
    if(pair&&pair.score)return{mode:"pair",groups:[{role:"owner",answers:pair.mine,scope:"pair:"+pair.id+":mine"},{role:"partner",answers:pair.partner,scope:"pair:"+pair.id+":partner"}],audio,total:pair.score};
    return null;
  }
  function showSaved(saved){shareLink.value=saved.shareUrl;editLink.value=saved.editorUrl;openEdit.href=saved.editorUrl;linksEl.classList.add("show");statusEl.textContent="已经找到之前保存成功的云端记录";detailEl.textContent="可以直接复制分享链接，或打开自己的编辑链接继续填写。"}
  async function request(path,options){const response=await fetch(CLOUD+path,options);let data=null;try{data=await response.json()}catch(e){}if(!response.ok)throw new Error(data&&data.error&&data.error.message?data.error.message:"网络保存失败（"+response.status+"）");return data}
  async function init(){
    const saved=json(MIGRATED,null);if(saved&&saved.shareUrl&&saved.editorUrl)showSaved(saved);
    let store=json(STORE,{single:{},pairs:{}});const old=json(OLD,{});if(!textCount(store.single)&&textCount(old)){store.single={...old};store.pairs=store.pairs||{};store.pairs.local=store.pairs.local||{mine:{...old},partner:{}}}
    const audio=await recordings();recovery=chooseRecovery(store,audio);
    if(!recovery){if(!(saved&&saved.shareUrl)){statusEl.textContent="这台浏览器里没有找到旧回答";detailEl.textContent="请确认使用的是原来填写时的同一个浏览器。"}return}
    const texts=recovery.groups.reduce((n,g)=>n+textCount(g.answers),0),voices=recovery.audio.filter(x=>recovery.groups.some(g=>g.scope===x.scope)).length;
    statusEl.textContent="✓ 找到了旧内容";detailEl.textContent="共找到 "+texts+" 条文字回答、"+voices+" 条原声录音。它们仍保存在这台手机里。";recoverBtn.disabled=false;backupBtn.disabled=false;
  }
  async function migrate(){
    recoverBtn.disabled=true;backupBtn.disabled=true;progressEl.classList.add("show");linksEl.classList.remove("show");
    try{
      progressEl.textContent="正在建立新的云端记录……";const created=await request("/api/records",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mode:recovery.mode})});let partnerToken="";
      if(created.partnerInviteUrl){const invite=new URL(created.partnerInviteUrl,CLOUD);partnerToken=new URLSearchParams(invite.hash.slice(1)).get("edit")||""}
      const tokens={owner:created.editToken,partner:partnerToken};let done=0;const scopedAudio=recovery.audio.filter(x=>recovery.groups.some(g=>g.scope===x.scope)),total=recovery.groups.reduce((n,g)=>n+textCount(g.answers),0)+scopedAudio.length;
      for(const group of recovery.groups){const token=tokens[group.role];if(!token)throw new Error("没有取得完整的编辑权限");for(const key of Object.keys(group.answers||{})){const value=String(group.answers[key]||"");if(!value.trim())continue;await request("/api/records/"+encodeURIComponent(created.record.id)+"/answers/q"+(Number(key)+1),{method:"PUT",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify({text:value})});progressEl.textContent="正在保存旧内容 "+(++done)+"/"+total+"……"}for(const item of scopedAudio.filter(x=>x.scope===group.scope)){const blob=item.blob,type=item.type||blob.type||"audio/webm";await request("/api/records/"+encodeURIComponent(created.record.id)+"/answers/q"+(Number(item.i)+1)+"/audio",{method:"PUT",headers:{Authorization:"Bearer "+token,"Content-Type":type},body:blob});progressEl.textContent="正在保存旧内容 "+(++done)+"/"+total+"……"}}
      progressEl.textContent="正在核对并生成分享链接……";const published=await request("/api/records/"+encodeURIComponent(created.record.id)+"/publish",{method:"POST",headers:{Authorization:"Bearer "+created.editToken}});const partnerPart=partnerToken?"&partner="+encodeURIComponent(partnerToken):"",saved={editorUrl:CLOUD+"/?record="+encodeURIComponent(created.record.id)+"#edit="+encodeURIComponent(created.editToken)+partnerPart,shareUrl:new URL(published.shareUrl,CLOUD).toString(),savedAt:Date.now()};localStorage.setItem(MIGRATED,JSON.stringify(saved));showSaved(saved);statusEl.textContent="✓ 旧文字和录音已经全部保存成功";detailEl.textContent="现在可以把分享链接发给别人；原来手机里的内容仍保留，没有删除。";progressEl.textContent="保存完成。";
    }catch(e){statusEl.textContent="保存还没有完成";detailEl.textContent=(e&&e.message?e.message:"请检查网络后重试")+"。原来的文字和录音没有被删除。";progressEl.textContent="请稍后重新点击保存。";recoverBtn.disabled=false;backupBtn.disabled=false}
  }
  function backup(){const payload={savedAt:new Date().toISOString(),mode:recovery.mode,groups:recovery.groups.map(g=>({role:g.role,answers:g.answers}))},blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json;charset=utf-8"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="关系问答文字安全备份.json";a.click();setTimeout(()=>URL.revokeObjectURL(url),1500)}
  async function copy(input,message){try{await navigator.clipboard.writeText(input.value);statusEl.textContent=message}catch(e){input.focus();input.select();statusEl.textContent="请长按链接并选择复制"}}
  recoverBtn.onclick=migrate;backupBtn.onclick=backup;document.getElementById("copyShare").onclick=()=>copy(shareLink,"✓ 分享链接已复制，可以发给别人");document.getElementById("copyEdit").onclick=()=>copy(editLink,"✓ 编辑链接已复制，只留给自己");init();
  </script>
</body>
</html>
